<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f0f0f0; }
        
        /* 建立一個容器，讓兩者並排或垂直排列 */
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        
        /* 設定 3D 模型與影片的共同樣式 */
        .item { width: 45%; min-width: 400px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        model-viewer { width: 100%; height: 400px; display: block; }
        video { width: 100%; height: 400px; border-radius: 15px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">
            <h3>3D Model</h3>
            <model-viewer id="viewer" shadow-intensity="1"></model-viewer>
        </div>

        <div class="item">
            <h3>Demonstration Video</h3>
            <video autoplay loop muted playsinline>
                <source src="https://zozo62.github.io/robot/0001-0160.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        // 你的模型控制邏輯完全保持不變
        const viewer = document.getElementById('viewer');
        const urlParams = new URLSearchParams(window.location.search);
        
        const modelName = urlParams.get('model') || 'Arm.glb';
        viewer.setAttribute('src', `https://zozo62.github.io/robot/models/${modelName}`);
        
        const orbit = urlParams.get('orbit') || '0deg 90deg auto';
        viewer.setAttribute('camera-orbit', orbit);

        if (urlParams.get('mode') === 'anim') {
            viewer.setAttribute('autoplay', '');
            viewer.setAttribute('animation-name', 'Action');
            viewer.setAttribute('disable-pan', '');
            viewer.setAttribute('disable-zoom', '');
            viewer.setAttribute('loop', '');
        } else {
            viewer.setAttribute('camera-controls', '');
            viewer.setAttribute('auto-rotate', '');
        }
    </script>
</body>
</html>
