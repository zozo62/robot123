<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
                  src="https://zozo62.github.io/robot/models/robot_anim.glb" 
                  shadow-intensity="1" 
                  camera-orbit="180deg 90deg auto"></model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('mode') === 'anim') {
            // 動畫模式：自動播放、關閉互動
            viewer.setAttribute('autoplay', '');
            viewer.setAttribute('animation-name', 'Action');
            viewer.setAttribute('disable-pan', '');
            viewer.setAttribute('disable-zoom', '');
        } else {
            // 互動模式：開啟手動旋轉 (360度)
            viewer.setAttribute('camera-controls', '');
            viewer.setAttribute('auto-rotate', '');
        }
    </script>
</body>
</html>
