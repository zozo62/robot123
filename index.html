<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BrickBot Showcase</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; width: 100%; height: 100%; }
        /* 確保 model-viewer 填滿 iframe/Embed 的容器 */
        model-viewer { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <model-viewer id="viewer" 
                  shadow-intensity="1" 
                  camera-controls 
                  auto-rotate
                  camera-target="auto auto auto" 
                  field-of-view="auto"
                  min-field-of-view="20deg">
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const urlParams = new URLSearchParams(window.location.search);
        
        // 你的模型清單
        const allowedModels = ['Arm.glb', 'Robot_leg.glb', 'AI_Robot_car.glb'];
        const modelName = urlParams.get('model');

        // 檢查模型是否存在於清單中
        if (modelName && allowedModels.includes(modelName)) {
            viewer.setAttribute('src', `https://zozo62.github.io/robot123/models/${modelName}`);
        } else {
            // 預設載入第一個
            viewer.setAttribute('src', `https://zozo62.github.io/robot123/models/Arm.glb`);
        }

        // 設定視角
        const orbit = urlParams.get('orbit') || '0deg 90deg auto';
        viewer.setAttribute('camera-orbit', orbit);

        // 設定展示模式
        if (urlParams.get('mode') === 'anim') {
            viewer.setAttribute('autoplay', '');
            viewer.setAttribute('animation-name', 'Action');
            viewer.setAttribute('disable-pan', '');
            viewer.setAttribute('disable-zoom', '');
            viewer.setAttribute('loop', '');
            viewer.removeAttribute('auto-rotate');
        } else {
            viewer.setAttribute('camera-controls', '');
            viewer.setAttribute('auto-rotate', '');
        }
    </script>
</body>
</html>
