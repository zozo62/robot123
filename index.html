<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0;">

    <h1>Robot Showcase</h1>

    <h3>Full Robot</h3>
    <model-viewer 
        src="models/AI Robot car.glb" 
        auto-rotate camera-controls 
        style="width: 500px; height: 500px; background-color: #D3D3D3;">
    </model-viewer>

    <h3>Kicking Action</h3>
    <model-viewer 
        src="models/move.glb" 
        auto-play loop animation-name="Action"
        camera-controls 
        style="width: 500px; height: 500px; background-color: #D3D3D3;">
    </model-viewer>

</body>
</html>
